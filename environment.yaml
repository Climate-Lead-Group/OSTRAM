name: OG-MOMF-env
channels:
  - conda-forge
dependencies:
  # Core
  - python=3.10
  - git>=2.40

  # Data stack
  - pandas>=2.1
  - numpy>=1.26
  - openpyxl>=3.1
  - pyyaml>=6.0
  - xlsxwriter>=3.2.4   # from conda-forge, stable on Windows

  # Pip (for DVC and otoole)
  - pip
  - pip:
      - dvc
      - otoole>=1.1.1    # install otoole via pip (usually the most reliable on Win)