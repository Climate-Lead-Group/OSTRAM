# Config_country_codes.yaml
# Single source of truth for country codes, names, and technology mappings

# ============================================================
# COUNTRY CONFIGURATION (Single Source of Truth)
# ============================================================
# Each country: iso3 key, english_name, ostram_name (Spanish, for OSTRAM & Shares Excel files)
country_data:
  BGD:
    english_name: "Bangladesh"
    ostram_name: "Bangladesh"
  BTN:
    english_name: "Bhutan"
    ostram_name: "Bhutan"
  IND:
    english_name: "India"
    ostram_name: "India"
  NPL:
    english_name: "Nepal"
    ostram_name: "Nepal"
  LKA:
    english_name: "Sri Lanka"
    ostram_name: "Sri Lanka"
  MDV:
    english_name: "Maldives"
    ostram_name: "Maldives"

# Special entries (not model countries, used in iso_country_map)
special_entries:
  INT: "International Markets"

# ============================================================
# MODEL SETTINGS
# ============================================================

# Reference year for the model (first year of the model horizon)
first_year: 2023

# Whether to add missing countries' demand data from OSTRAM generation file
# When true, A1 reads OSTRAM Excel to fill in countries not present in the input CSVs
add_missing_countries_from_ostram: false

# PWR technology cleanup mode (handles PWR00/PWR01 duplicates):
#   "drop"  - drop PWR00 rows when PWR01 exists, then rename PWR01 (removes '01' suffix)
#   "merge" - sum PWR00 values into PWR01, then drop PWR00, then rename PWR01
#   false   - skip PWR cleanup entirely
pwr_cleanup_mode: merge

# ============================================================
# TECHNOLOGY CONFIGURATION
# ============================================================

# Technology name (in Excel source files) -> model 3-char code
ostram_tech_mapping:
  Nuclear: URN
  "Natural gas": NGS
  "Mineral coal": COA
  Hydro: HYD
  Geothermal: GEO
  Wind: WON
  Solar: SPV
  # BIO is special: sum of Biogas + Solid biomass + Liquid biofuels

# Model tech code -> description
code_to_energy:
  MIN: "Mining tradable commodity"
  RNW: "Mining non-tradable (renewable) commodity"
  BIO: "Biomass"
  GAS: "Natural Gas"
  COA: "Coal"
  GEO: "Geothermal"
  HYD: "Hydroelectric"
  OIL: "Oil"
  OTH: "Other"
  PET: "Petroleum"
  SPV: "Solar Photovoltaic"
  URN: "Nuclear"
  WAV: "Wave"
  WAS: "Waste"
  WOF: "Offshore Wind"
  WON: "Onshore Wind"
  CCG: "Combined Cycle Natural Gas"
  COG: "Cogeneration"
  CSP: "Concentrated Solar Power"
  NGS: "Natural Gas"
  OCG: "Open Cycle Natural Gas"
  TRN: "Transmission technology"
  LDS: "Long duration storage"
  SDS: "Short duration storage"
  PWR: "Power generator"
  ELC: "Electricity"
  BCK: "Backstop"
  CCS: "Carbon Capture Storage with Coal"

# Renewable fuel codes (used to classify technologies)
renewable_fuels:
  - BIO
  - HYD
  - CSP
  - GEO
  - SPV
  - WAS
  - WON
  - WOF

# Shares technology name -> model tech code (for Shares_Power_Generation_Technologies.xlsx)
shares_tech_mapping:
  Biomass: BIO
  Bunker: OIL
  Coal: COA
  Diesel: PET
  Wind: WON
  "Fuel oil": OIL
  "Natural gas": NGS
  Geothermal: GEO
  Hydroelectric: HYD
  Nuclear: URN
  "Solar (DG)": SPV
  "Solar (utility scale)": SPV

# ============================================================
# COUNTRY LIST & TRANSMISSION TECHNOLOGY PARAMETERS
# ============================================================

# List of country codes (used by A2_AddTx for region pairs)
countries:
  # - "BGD"
  # - "BTN"
  # - "IND"
  # - "NPL"
  # - "LKA"
  # - "MDV"
  - "BGD"
  - "BTN"
  - "INDEA"    # India East
  - "INDNE"    # India North-East
  - "INDNO"    # India North
  - "INDSO"    # India South
  - "INDWE"    # India West
  - "NPL"
  - "LKA"
  - "MDV"

# ============================================================
# TEMPLATE GENERATION (for Z_generate_country_template.py)
# ============================================================
# Configure here and just run: python Z_generate_country_template.py
# The script processes each entry in the list sequentially.
#
# Fields per entry:
#   new_country:          3-letter ISO code for the new country
#   reference_country:    existing country to clone data from
#   region:               region code (default: XX). Use 2-letter code for sub-regions
#   interconnections:     list of neighbor codes (3-letter = region XX, 5-letter = explicit region)
#                         leave empty for zero interconnections
#                         remove the key entirely for legacy mode (copies reference topology)
#   centerpoint_lat:      latitude of the country/region centerpoint
#   centerpoint_lon:      longitude of the country/region centerpoint
#
# ── EXAMPLES ──────────────────────────────────────────────────
#
# Example 1: Single country, single region (most common case)
#   - new_country: MDV
#     reference_country: LKA
#     region: XX
#     centerpoint_lat: 1.924992
#     centerpoint_lon: 73.399658
#     interconnections:
#       - LKA
#
# Example 2: Multiple countries at once
#   - new_country: MMR
#     reference_country: BGD
#     region: XX
#     centerpoint_lat: 16.871311
#     centerpoint_lon: 96.199379
#     interconnections:
#       - BGD
#       - IND
#   - new_country: PAK
#     reference_country: IND
#     region: XX
#     centerpoint_lat: 24.87
#     centerpoint_lon: 66.99
#     interconnections:
#       - INDNO
#       - INDWE
#
# Example 3: Country with multiple regions (like India)
#   Each region needs its own entry with its own centerpoint.
#   Use 5-letter codes for interconnections to specific regions.
#   - new_country: CHN
#     reference_country: IND
#     region: SO                          # China South → CHNSO
#     centerpoint_lat: 23.145
#     centerpoint_lon: 113.325
#     interconnections:
#       - MMRXX
#       - CHNNO                           # connected to China North
#   - new_country: CHN
#     reference_country: IND
#     region: NO                          # China North → CHNNO
#     centerpoint_lat: 39.929
#     centerpoint_lon: 116.388
#     interconnections:
#       - CHNSO                           # connected to China South
#       - MNGXX
#
# ── ACTIVE CONFIGURATION ─────────────────────────────────────
template_generation:
  - new_country: MDV
    reference_country: LKA
    region: XX
    centerpoint_lat: 1.924992
    centerpoint_lon: 73.399658
    interconnections:
      - LKA

# Implausible technology-country combinations based on OG_csvs_inputs data
# (ResidualCapacity, CapitalCost, TotalAnnualMaxCapacityInvestment, TotalAnnualMaxCapacity)
# A combo is implausible when all four parameters are zero for every year
# Format: technology_code -> list of country codes where it is implausible
implausible_combinations:
  # BIO (Biomass) - No biomass resources or grid-connected capacity
  BIO: [BTN, MDV]
  # CCS (Carbon Capture Storage with Coal) - No coal infrastructure to retrofit
  CCS: [BTN, NPL, LKA, MDV]
  # COA (Coal) - No coal plants, no coal resources, no plans
  COA: [BTN, NPL, MDV]
  # COG (Cogeneration) - No industrial base for cogeneration
  COG: [BTN, NPL, MDV]
  # CSP (Concentrated Solar Power) - Unsuitable climate/terrain or insufficient land area
  CSP: [BGD, BTN, NPL, LKA, MDV]
  # GAS (Natural Gas) - No PWRGAS technology in model; gas generation modeled via CCG/OCG → NGS
  GAS: [BGD, BTN, IND, NPL, LKA, MDV]
  # GEO (Geothermal) - No geothermal resources in any modeled country
  GEO: [BGD, BTN, IND, NPL, LKA, MDV]
  # HYD (Hydroelectric) - Flat coral atolls, no rivers or elevation
  HYD: [MDV]
  # NGS (Natural Gas unified) - No CCG/OCG/NGS power data
  NGS: [BGD, BTN, NPL, MDV]
  # OIL (Oil/Fuel Oil) - No oil-fired grid power plants
  OIL: [BTN, NPL, MDV]
  # URN (Nuclear) - No nuclear program or plans
  URN: [BTN, NPL, LKA, MDV]
  # WAS (Waste-to-Energy) - No waste-to-energy plants or plans
  WAS: [BTN, MDV]
  # WAV (Wave Energy) - No capacity or plans; BTN and NPL are landlocked
  WAV: [BGD, BTN, IND, NPL, LKA, MDV]
  # WOF (Offshore Wind) - BTN/NPL landlocked; MDV scale economically unviable
  WOF: [BTN, NPL, MDV]
  # WON (Onshore Wind) - No country lacks onshore wind data except MDV
  WON: [MDV]

