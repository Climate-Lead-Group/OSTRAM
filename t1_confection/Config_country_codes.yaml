# Config_country_codes.yaml
# Single source of truth for country codes, names, and technology mappings

# ============================================================
# COUNTRY CONFIGURATION (Single Source of Truth)
# ============================================================
# Each country: iso3 key, english_name, olade_name (Spanish, for OLADE & Shares Excel files)
country_data:
  BGD:
    english_name: "Bangladesh"
    olade_name: "Bangladesh"
  BTN:
    english_name: "Bhutan"
    olade_name: "Bhutan"
  IND:
    english_name: "India"
    olade_name: "India"
  NPL:
    english_name: "Nepal"
    olade_name: "Nepal"
  LKA:
    english_name: "Sri Lanka"
    olade_name: "Sri Lanka"
  MDV:
    english_name: "Maldives"
    olade_name: "Maldives"

# Special entries (not model countries, used in iso_country_map)
special_entries:
  INT: "International Markets"

# ============================================================
# MODEL SETTINGS
# ============================================================

# Reference year for the model (first year of the model horizon)
first_year: 2023

# Whether to add missing countries' demand data from OLADE generation file
# When true, A1 reads OLADE Excel to fill in countries not present in the input CSVs
add_missing_countries_from_olade: false

# ============================================================
# TECHNOLOGY CONFIGURATION
# ============================================================

# OLADE technology name -> model 3-char code
olade_tech_mapping:
  Nuclear: URN
  "Gas natural": NGS
  "Carbón mineral": COA
  Hidro: HYD
  Geotermia: GEO
  "Eólica": WON
  Solar: SPV
  # BIO is special: sum of Biogás + Biomasa sólida + Biocombustibles líquidos

# Model tech code -> description
code_to_energy:
  MIN: "Mining tradable commodity"
  RNW: "Mining non-tradable (renewable) commodity"
  BIO: "Biomass"
  GAS: "Natural Gas"
  COA: "Coal"
  GEO: "Geothermal"
  HYD: "Hydroelectric"
  OIL: "Oil"
  OTH: "Other"
  PET: "Petroleum"
  SPV: "Solar Photovoltaic"
  URN: "Nuclear"
  WAV: "Wave"
  WAS: "Waste"
  WOF: "Offshore Wind"
  WON: "Onshore Wind"
  CCG: "Combined Cycle Natural Gas"
  COG: "Cogeneration"
  CSP: "Concentrated Solar Power"
  NGS: "Natural Gas"
  OCG: "Open Cycle Natural Gas"
  TRN: "Transmission technology"
  LDS: "Long duration storage"
  SDS: "Short duration storage"
  PWR: "Power generator"
  ELC: "Electricity"
  BCK: "Backstop"
  CCS: "Carbon Capture Storage with Coal"

# Renewable fuel codes (used to classify technologies)
renewable_fuels:
  - BIO
  - HYD
  - CSP
  - GEO
  - SPV
  - WAS
  - WON
  - WOF

# Shares technology name -> model tech code (for Shares_Power_Generation_Technologies.xlsx)
shares_tech_mapping:
  Biomasa: BIO
  "Búnker": OIL
  "Carbón": COA
  "Diésel": PET
  "Eólica": WON
  "Fuel oil": OIL
  "Gas natural": NGS
  "Geotérmica": GEO
  "Hidroeléctrica": HYD
  Nuclear: URN
  "Solar (GD)": SPV
  "Solar (gran escala)": SPV

# ============================================================
# COUNTRY LIST & TRANSMISSION TECHNOLOGY PARAMETERS
# ============================================================

# List of country codes (used by A2_AddTx for region pairs)
countries:
  - "BGD"
  - "BTN"
  - "IND"
  - "NPL"
  - "LKA"
  - "MDV"

# ============================================================
# TEMPLATE GENERATION (for Z_generate_country_template.py)
# ============================================================
# Configure here and just run: python Z_generate_country_template.py
#
# new_country:          3-letter code for the new country
# reference_country:    existing country to clone data from
# region:               region code for the new country (default: XX)
# interconnections:     list of neighbor codes (3-letter = region XX, 5-letter = explicit region)
#                       leave empty for zero interconnections
#                       remove the key entirely for legacy mode (copies reference topology)
template_generation:
  new_country: MDV
  reference_country: LKA
  region: XX
  interconnections:

# Implausible technology-country combinations based on OLADE 2023 installed capacity data
# These combinations have zero installed capacity and are marked as NO with red highlighting
# Source: "OLADE - Capacidad instalada por fuente - Anual.xlsx" (sieLAC-OLADE, Nov 2024)
# Format: technology_code -> list of country codes where it is implausible
implausible_combinations:
  # BIO (Biomass) - No capacity in HTI, BRB
  BIO: [HTI, BRB]
  # COA (Coal) - No capacity in BOL, CRI, ECU, HND, HTI, BRB, NIC, PRY, SLV, URY
  COA: [BOL, CRI, ECU, HND, HTI, BRB, NIC, PRY, SLV, URY]
  # GAS (Natural Gas) - No capacity in CRI, HND, HTI, BRB, NIC, PRY, URY
  GAS: [CRI, HND, HTI, BRB, NIC, PRY, URY]
  # GEO (Geothermal) - Only in CHL, CRI, GTM, HND, MEX, NIC, SLV
  GEO: [ARG, BOL, BRA, BRB, COL, DOM, ECU, HTI, PAN, PER, PRY, URY]
  # HYD (Hydroelectric) - No capacity in BRB
  HYD: [BRB]
  # NGS (Natural Gas unified) - Same as GAS
  NGS: [CRI, HND, HTI, BRB, NIC, PRY, URY]
  # URN (Nuclear) - Only in ARG, BRA, MEX
  URN: [BOL, BRB, CHL, COL, CRI, DOM, ECU, GTM, HND, HTI, NIC, PAN, PER, PRY, SLV, URY]
  # WON (Onshore Wind) - No capacity in BRB
  WON: [BRB]

# Technology parameters
# Renewable transmission technologies
#Existing renewable transmission technologies
RNWTRN:
  CapacityToActivityUnit: 31.536
  OperationalLife: 20
  CapitalCost: 100
  FixedCost: 4
  ResidualCapacity: 5
  TotalAnnualMaxCapacityInvestment: 5
#Repowered renewable transmission technologies
RNWRPO:
  CapacityToActivityUnit: 31.536
  OperationalLife: 20
  CapitalCost: 100
  FixedCost: 4
  ResidualCapacity: 5
  TotalAnnualMaxCapacityInvestment: 5
#New lines of renewable transmission technologies
RNWNLI:
  CapacityToActivityUnit: 31.536
  OperationalLife: 20
  CapitalCost: 100
  FixedCost: 4
  ResidualCapacity: 5
  TotalAnnualMaxCapacityInvestment: 5

# Non-renewable transmission technologies
