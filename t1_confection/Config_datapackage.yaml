# Config_datapackage.yaml
# Configuration for A3_update_csvs_from_datapackage.py
# Updates OG_csvs_inputs/ CSVs from DATA_PACKAGE_V2 sources

# ============================================================
# SCENARIO SETTINGS
# ============================================================
scenario: BAU                    # Scenario name (for logging)
cost_scenario: Conservative      # Conservative, Moderate, or Ambitious
data_package_path: DATA_PACKAGE_V2
backup_existing_csvs: true       # Create backup before overwriting

# ============================================================
# OUTPUT MODE
# ============================================================
# 'excel' → write directly to A1_Outputs Excel files (preserves Tx layers)
# 'csv'   → legacy mode, write to OG_csvs_inputs/ CSVs
output_mode: excel
a1_outputs_subdir: A1_Outputs/A1_Outputs_BAU   # relative to t1_confection/

# ============================================================
# MODEL HORIZON
# ============================================================
first_year: 2023
final_year: 2050

# ============================================================
# TECHNOLOGY NAME MAP: Cost DB Code → OSTRAM 3-char code
# ============================================================
# Direct 1:1 mappings
tech_name_map:
  PWRSPV: SPV
  PWRSPR: SPV    # Rooftop solar → aggregated into SPV
  PWRFPV: SPV    # Floating PV → aggregated into SPV
  PWRCSP: CSP
  PWRWON: WON
  PWRWOF: WOF
  PWRHDR: HYD    # Hydro reservoir → aggregated into HYD
  PWRHRO: HYD    # Hydro RoR → aggregated into HYD
  PWRHPS: HYD    # Pumped storage → aggregated into HYD
  PWRCOASCPC: COA  # Supercritical coal
  PWRCOAUSC: COA   # Ultra-supercritical coal
  PWRCCG: NGS    # CCGT → unified NGS
  PWROCG: NGS    # OCGT → unified NGS
  PWRURN: URN
  PWRBIO: BIO
  PWRWTE: WAS    # Waste-to-Energy
  PWROIL: OIL
  PWRTDL: WAV    # Tidal/Marine → WAV
  PWRGEO: GEO
  PWRSDS: SDS    # Battery Li-ion 4h
  PWRLDS: LDS    # Long duration storage
  PWRBCK: BCK    # Backstop
  PWRH2G: OTH    # Hydrogen (not yet modeled separately)

# Technologies that aggregate N:1 (multiple Cost DB codes → one OSTRAM code)
# The aggregation method comes from Aggregation_Rules
aggregated_techs:
  SPV: [PWRSPV, PWRSPR, PWRFPV]
  HYD: [PWRHDR, PWRHRO, PWRHPS]
  COA: [PWRCOASCPC, PWRCOAUSC]
  NGS: [PWRCCG, PWROCG]

# ============================================================
# AGGREGATION RULES (from Tech_Country_Matrix.xlsx → Aggregation_Rules)
# ============================================================
# When multiple Cost DB techs combine into one OSTRAM code:
aggregation_rules:
  AVG:
    - CapitalCost
    - FixedCost
    - VariableCost
    - CapacityFactor
    - OperationalLife
    - AvailabilityFactor
    - CapacityToActivityUnit
  SUM:
    - ResidualCapacity
    - TotalAnnualMaxCapacity
    - TotalAnnualMaxCapacityInvestment
    - SpecifiedAnnualDemand

# ============================================================
# COUNTRY MULTIPLIER MAPPING (Cost DB 2-char → OSTRAM 3-char)
# ============================================================
# Node_Anchors uses 2-char codes; map to ISO-3
node_to_iso3:
  IN: IND
  BD: BGD
  LK: LKA
  NP: NPL
  BT: BTN
  MV: MDV

# ============================================================
# INDIA STATE/ZONE → OSTRAM REGION MAPPING
# ============================================================
# For IND_Power_Infrastructure.xlsx "Zone" column → OSTRAM region codes
india_zone_to_region:
  NR: INDNO     # Northern Region
  WR: INDWE     # Western Region
  SR: INDSO     # Southern Region
  ER: INDEA     # Eastern Region
  NER: INDNE    # North Eastern Region

# For IND_Energy_Statistics.xlsx "5_Demand_Energy_State" → OSTRAM region codes
india_state_region_to_ostram:
  "Northern Region": INDNO
  "Western Region": INDWE
  "Southern Region": INDSO
  "Eastern Region": INDEA
  "North Eastern Region": INDNE

# ============================================================
# FUEL COST → TECHNOLOGY MAPPING
# ============================================================
# Tech codes that use RNW prefix (region 5-char suffix, e.g. RNWBIOINDEA)
# Everything else uses MIN prefix (country 3-char suffix, e.g. MINCOAIND)
rnw_tech_codes: [BIO, CSP, GEO, HYD, SPV, WAS, WAV, WOF, WON]

# Maps fuel names from Fuel_Costs sheet to OSTRAM technology codes
fuel_to_tech:
  "Imported coal (FOB Aus)": COA
  "India domestic coal": COA
  "Bangladesh piped gas": GAS
  "LNG (Asia/JKM)": GAS
  "Diesel / HFO": OIL
  "Diesel (Maldives)": PET
  "Uranium": URN
  "Biomass": BIO
  "Waste / MSW": WAS

# Maps fuel Node_Override codes to OSTRAM regions
fuel_node_to_regions:
  "All": [BGDXX, BTNXX, INDEA, INDNE, INDNO, INDSO, INDWE, NPLXX, LKAXX, MDVXX]
  "BD,LK": [BGDXX, LKAXX]
  "BD": [BGDXX]
  "IN_all": [INDEA, INDNE, INDNO, INDSO, INDWE]
  "IN_W,IN_S,LK": [INDWE, INDSO, LKAXX]
  "LK,MV": [LKAXX, MDVXX]
  "MV": [MDVXX]
  "IN,BD,LK": [INDEA, INDNE, INDNO, INDSO, INDWE, BGDXX, LKAXX]
  "IN,LK": [INDEA, INDNE, INDNO, INDSO, INDWE, LKAXX]
  "IN": [INDEA, INDNE, INDNO, INDSO, INDWE]

# ============================================================
# FUEL TYPE MAPPING (Power Infrastructure → OSTRAM tech code)
# ============================================================
power_fuel_type_to_tech:
  # BGD
  "Gas": NGS
  "Coal": COA
  "HFO": OIL
  "HSD": PET
  "Hydro": HYD
  "Solar": SPV
  "Wind": WON
  "Import": null     # Not a generation technology
  "Dual Fuel": NGS   # Gas + HFO → classified as NGS
  # IND
  "Bio Power": BIO
  "Oil & Gas": NGS   # India's oil & gas is mostly gas plants
  "Nuclear": URN
  "Small Hydro": HYD
  # LKA
  "Oil (HFO/Diesel)": OIL
  "Mini Hydro": HYD
  "Biomass": BIO
  # NPL
  "Solar PV": SPV
  # MDV
  "Diesel": PET

# ============================================================
# VRE RESOURCE → OSTRAM TECH MAPPING
# ============================================================
vre_resource_to_tech:
  solar: SPV
  wind: WON

# ============================================================
# DEMAND EXTRAPOLATION RATES
# ============================================================
# Rates based on official planning documents (see plan for full citations)
# Used only when source data does not cover 2023-2050
extrapolation_rates:
  BGD:
    rate: 0.038
    source: "IEPMP 2023 terminal rate (3.8%/yr post-2041)"
  IND:
    rate: 0.049
    source: "CEA NEP PAM 7.3% GDP long-term average"
  LKA:
    rate: 0.038
    source: "LTGEP terminal rate 2048-2049 (3.8%/yr)"
  NPL:
    rate: 0.050
    source: "CES Reference 7% GDP scenario (~5%/yr)"
  BTN:
    rate: 0.050
    source: "Regional average (no official projection post-2030)"
  MDV:
    rate: 0.050
    source: "MCCEE Road Map stated base case (5%/yr)"

# ============================================================
# DEMAND DATA CONFIGURATION
# ============================================================
# Specifies which sheets/columns to read for each country's demand
demand_config:
  BGD:
    energy_sheet: "2_Demand_Forecasts"
    energy_start_row: 20        # Row with year 2023
    year_col: 0                 # Column A = Year
    value_col: 1                # Column B = Peak Demand (GW) Low
    value_unit: GW              # Will convert to PJ
    demand_type: peak_gw        # Peak demand in GW
  IND:
    energy_sheet: "5_Demand_Energy_State"
    energy_start_row: 3         # First data row
    value_unit: GWh             # MU = GWh
  LKA:
    energy_sheet: "Demand Forecast"
    energy_start_row: 4         # Row with year 2025
    year_col: 0
    value_col: 1                # Demand (GWh)
    value_unit: GWh
  NPL:
    energy_sheet: "Demand Forecasts"
    energy_start_row: 13        # CES Reference row
    value_unit: TWh
  BTN:
    energy_sheet: "3_Demand"
    energy_start_row: 22        # PSMP forecast row
    value_unit: GWh
  MDV:
    energy_sheet: "Demand Forecasts"
    value_unit: GWh
