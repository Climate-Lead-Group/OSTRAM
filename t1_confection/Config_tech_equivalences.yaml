  PWRWONMEXXX01: PWRWONMEXXX
  PWRWONNICXX01: PWRWONNICXX
  PWRWONPANXX01: PWRWONPANXX
  PWRWONPERXX01: PWRWONPERXX
  PWRWONPRYXX01: PWRWONPRYXX
  PWRWONSLVXX01: PWRWONSLVXX
  PWRWONURYXX01: PWRWONURYXX

# =============================================================================
# TECHNOLOGIES REMOVED FROM NEW MODEL (Demand Techs)
# =============================================================================

removed_demand_techs:
  description: "These technology types were completely removed from the new model"
  types:
    - prefix: "PWRTRN"
      description: "Power Transmission"
    - prefix: "RNWNLI"
      description: "Renewable NLI"
    - prefix: "RNWRPO"
      description: "Renewable RPO"
    - prefix: "RNWTRN"
      description: "Renewable Transmission"
    - prefix: "TRNNLI"
      description: "Transmission NLI"
    - prefix: "TRNRPO"
      description: "Transmission RPO"

# =============================================================================
# TECHNOLOGIES UNCHANGED (no suffix in both versions)
# =============================================================================

unchanged_techs:
  description: "These technologies have the same code in both versions"
  types:
    - prefix: "PWRBCK"
      description: "Backup technologies (no suffix in both)"
    - prefix: "ELC"
      description: "Electricity commodities"
    - prefix: "TRN"
      suffix: "XX"
      description: "Transmission between countries (e.g., TRNARGXXBOLXX)"

# =============================================================================
# TECHNOLOGY AVAILABILITY BY COUNTRY
# =============================================================================
# Source of truth: Tech_Country_Matrix.xlsx (read dynamically at runtime)
# The matrix defines which technologies are available in each country.
# This section documents the reasoning but the script reads the matrix directly.

tech_availability:
  source_file: "Tech_Country_Matrix.xlsx"
  description: |
    Technology availability is determined by reading Tech_Country_Matrix.xlsx
    at runtime. This ensures the migration script always uses the current
    matrix without needing to update this YAML file.

    The matrix uses YES/NO values to indicate if a technology is available
    for a given country. Technologies marked as NO will be skipped during
    migration (old data won't be imported for non-existent tech/country pairs).

  # Documentation of WHY certain technologies are restricted (for reference)
  tech_restrictions_rationale:
    NGS: "Natural Gas - requires gas infrastructure"
    GEO: "Geothermal - requires geothermal potential (volcanic/tectonic zones)"
    URN: "Nuclear - only countries with existing nuclear reactors"
    COA: "Coal - based on existing plants and decarbonization policies"
    BIO: "Biomass - requires biomass feedstock availability"
    HYD: "Hydroelectric - requires hydro potential"
    WON: "Onshore Wind - based on wind resource assessment"

# =============================================================================
# AGGREGATION RULES (for ALL parameters when merging CCG+OCG -> NGS)
# =============================================================================

aggregation_rules:
  # Capacity-related parameters: SUM all CCG and OCG values
  ResidualCapacity:
    method: "sum"
    description: "Sum CCG and OCG capacities to get NGS capacity"

  TotalAnnualMaxCapacity:
    method: "sum"
    description: "Sum of maximum capacities"

  TotalAnnualMaxCapacityInvestment:
    method: "sum"
    description: "Sum of maximum investment capacities"

  TotalAnnualMinCapacityInvestment:
    method: "sum"
    description: "Sum of minimum investment capacities"

  # Activity limits: SUM
  TotalTechnologyAnnualActivityUpperLimit:
    method: "sum"
    description: "Sum of activity upper limits"

  TotalTechnologyAnnualActivityLowerLimit:
    method: "sum"
    description: "Sum of activity lower limits"

  # Cost parameters: Use weighted average by capacity, fallback to CCG
  CapitalCost:
    method: "weighted_average_by_capacity"
    fallback: "use_ccg"
    description: "Weighted average by capacity, or use CCG if no capacity data"

  FixedCost:
    method: "weighted_average_by_capacity"
    fallback: "use_ccg"
    description: "Weighted average by capacity, or use CCG if no capacity data"

  # Factor parameters: Use weighted average by capacity
  AvailabilityFactor:
    method: "weighted_average_by_capacity"
    fallback: "use_ccg"
    description: "Weighted average by capacity"

  # Reserve margin tags: Use maximum (if any has tag=1, result=1)
  ReserveMarginTagTechnology:
    method: "max"
    description: "If any CCG/OCG has tag=1, NGS gets tag=1"

  ReserveMarginTagFuel:
    method: "max"
    description: "If any CCG/OCG has tag=1, NGS gets tag=1"

# =============================================================================
# PARAMETER HANDLING FOR DIRECT MAPPINGS (XX01 -> XX, no aggregation)
# =============================================================================

direct_mapping_rules:
  description: |
    For technologies that are simply renamed (suffix removal),
    all parameter values are copied directly without aggregation.

    Example: PWRBIOARGXX01 -> PWRBIOARGXX
    All parameters (CapitalCost, FixedCost, ResidualCapacity, etc.)
    are copied as-is from old to new.
