# Technology Equivalences Dictionary
# Maps OLD model technology codes to NEW model technology codes
#
# This file documents the changes between model versions and is used by
# the migration script to import data from Old_Inputs/ to current files.
#
# Created: 2024-12-12
# ============================================================================

# Model version info
model_versions:
  old: "RELAC v1.x (with CCG/OCG separation and XX00/XX01 suffixes)"
  new: "RELAC v2.x (unified NGS, simplified suffixes)"

# Countries in the model (19 countries)
countries:
  - ARG  # Argentina
  - BOL  # Bolivia
  - BRA  # Brasil
  - CHL  # Chile
  - COL  # Colombia
  - CRI  # Costa Rica
  - DOM  # Republica Dominicana
  - ECU  # Ecuador
  - GTM  # Guatemala
  - HND  # Honduras
  - HTI  # Haiti
  - BRB  # Barbados
  - MEX  # Mexico
  - NIC  # Nicaragua
  - PAN  # Panama
  - PER  # Peru
  - PRY  # Paraguay
  - SLV  # El Salvador
  - URY  # Uruguay

# =============================================================================
# TRANSFORMATION RULES
# =============================================================================

# Rule 1: Suffix transformation
# OLD format: PWR{TECH}{COUNTRY}XX{SUFFIX} where SUFFIX = 00 or 01
# NEW format: PWR{TECH}{COUNTRY}XX (no suffix)
suffix_rules:
  # Remove XX00 and XX01 suffixes, keep only XX
  pattern: "^(PWR[A-Z]{3}[A-Z]{3}XX)(0[01])$"
  replacement: "\\1"
  description: "Remove 00/01 suffix from technology codes"

# Rule 2: Gas Natural Unification (CCG + OCG -> NGS)
# This is the most important transformation
gas_unification:
  description: |
    In the old model, natural gas technologies were split into:
    - CCG (Combined Cycle Gas) with XX00 and XX01 variants
    - OCG (Open Cycle Gas) with XX00 and XX01 variants

    In the new model, these are unified into:
    - NGS (Natural Gas Simple) with no suffix variants

    When migrating data:
    - Values from CCG and OCG should be SUMMED for capacity-related parameters
    - For cost parameters, use weighted average or CCG values (dominant technology)

  old_codes:
    - CCG  # Combined Cycle Gas
    - OCG  # Open Cycle Gas

  new_code: NGS  # Natural Gas (unified)

  # Specific mappings per country (all countries have this transformation)
  mappings:
    # Argentina
    - old: ["PWRCCGARGXX00", "PWRCCGARGXX01", "PWROCGARGXX00", "PWROCGARGXX01"]
      new: "PWRNGSARGXX"
    # Bolivia
    - old: ["PWRCCGBOLXX00", "PWRCCGBOLXX01", "PWROCGBOLXX00", "PWROCGBOLXX01"]
      new: "PWRNGSBOLXX"
    # Brasil
    - old: ["PWRCCGBRAXX00", "PWRCCGBRAXX01", "PWROCGBRAXX00", "PWROCGBRAXX01"]
      new: "PWRNGSBRAXX"
    # Chile
    - old: ["PWRCCGCHLXX00", "PWRCCGCHLXX01", "PWROCGCHLXX00", "PWROCGCHLXX01"]
      new: "PWRNGSCHLXX"
    # Colombia
    - old: ["PWRCCGCOLXX00", "PWRCCGCOLXX01", "PWROCGCOLXX00", "PWROCGCOLXX01"]
      new: "PWRNGSCOLXX"
    # Costa Rica (note: NGS doesn't exist in new model for CRI)
    - old: ["PWRCCGCRIXX00", "PWRCCGCRIXX01", "PWROCGCRIXX00", "PWROCGCRIXX01"]
      new: null  # Technology removed for this country
    # Dominican Republic
    - old: ["PWRCCGDOMXX00", "PWRCCGDOMXX01", "PWROCGDOMXX00", "PWROCGDOMXX01"]
      new: "PWRNGSDOMXX"
    # Ecuador
    - old: ["PWRCCGECUXX00", "PWRCCGECUXX01", "PWROCGECUXX00", "PWROCGECUXX01"]
      new: "PWRNGSECUXX"
    # Guatemala
    - old: ["PWRCCGGTMXX00", "PWRCCGGTMXX01", "PWROCGGTMXX00", "PWROCGGTMXX01"]
      new: "PWRNGSGTMXX"
    # Honduras (note: NGS doesn't exist in new model for HND)
    - old: ["PWRCCGHNDXX00", "PWRCCGHNDXX01", "PWROCGHNDXX00", "PWROCGHNDXX01"]
      new: null  # Technology removed for this country
    # Haiti (note: NGS doesn't exist in new model for HTI)
    - old: ["PWRCCGHTIXX00", "PWRCCGHTIXX01", "PWROCGHTIXX00", "PWROCGHTIXX01"]
      new: null  # Technology removed for this country
    # Barbados (note: NGS doesn't exist in new model for BRB)
    - old: ["PWRCCGBRBXX00", "PWRCCGBRBXX01", "PWROCGBRBXX00", "PWROCGBRBXX01"]
      new: null  # Technology removed for this country
    # Mexico
    - old: ["PWRCCGMEXXX00", "PWRCCGMEXXX01", "PWROCGMEXXX00", "PWROCGMEXXX01"]
      new: "PWRNGSMEXXX"
    # Nicaragua (note: NGS doesn't exist in new model for NIC)
    - old: ["PWRCCGNICXX00", "PWRCCGNICXX01", "PWROCGNICXX00", "PWROCGNICXX01"]
      new: null  # Technology removed for this country
    # Panama
    - old: ["PWRCCGPANXX00", "PWRCCGPANXX01", "PWROCGPANXX00", "PWROCGPANXX01"]
      new: "PWRNGSPANXX"
    # Peru
    - old: ["PWRCCGPERXX00", "PWRCCGPERXX01", "PWROCGPERXX00", "PWROCGPERXX01"]
      new: "PWRNGSPERXX"
    # Paraguay (note: NGS doesn't exist in new model for PRY)
    - old: ["PWRCCGPRYXX00", "PWRCCGPRYXX01", "PWROCGPRYXX00", "PWROCGPRYXX01"]
      new: null  # Technology removed for this country
    # El Salvador
    - old: ["PWRCCGSLVXX00", "PWRCCGSLVXX01", "PWROCGSLVXX00", "PWROCGSLVXX01"]
      new: "PWRNGSSLVXX"
    # Uruguay (note: NGS doesn't exist in new model for URY)
    - old: ["PWRCCGURYXX00", "PWRCCGURYXX01", "PWROCGURYXX00", "PWROCGURYXX01"]
      new: null  # Technology removed for this country

